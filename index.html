<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>نسخة من العرض الفني - (2) شركة عبدالله خلف للمقاولات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@400;600;700;900&display=swap"
    rel="stylesheet">
  <style>
    /* =========================================================
     FONTS
     ========================================================= */
    @font-face {
      font-family: 'DIN Next LT Arabic';
      src: url('DINNextLTArabic-Regular-3.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* =========================================================
     DESIGN TOKENS
     ========================================================= */
    :root {
      --navy-dark: #1c3f4d;
      --navy-mid: #17495a;
      --teal: #1D7A6A;
      --teal-light: #4fa89b;
      --gold: #c9a876;
      --gold-line: #c0996E;
      --paper: #eef3f4;
      --paper-2: #BBD2D8;
      --ink: #3A3C39;
      --ink-soft: #4a5a5e;
      --white: #ffffff;

      --font-display: 'DIN Next LT Arabic', 'Tajawal', sans-serif;
      --font-body: 'DIN Next LT Arabic', 'Cairo', sans-serif;

      --page-w: 297mm;
      --page-h: 190mm;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: #7a8b8f;
      font-family: var(--font-body);
      color: var(--ink);
    }

    /* =========================================================
     PAGE SHELL
     ========================================================= */
    .page {
      position: relative;
      width: var(--page-w);
      height: var(--page-h);
      margin: 10mm auto;
      background: var(--paper);
      overflow: hidden;
      box-shadow: 0 1mm 6mm rgba(0, 0, 0, 0.25);
      break-after: page;
      page-break-after: always;
    }

    .page:last-child {
      break-after: auto;
      page-break-after: auto;
    }

    .page__footnote {
      /* position: absolute;
      left: 10mm;
      bottom: 6mm;
      display: flex;
      color: var(--ink-soft);
      gap: 1.5mm;
      z-index: 5; */
      padding: 56px;
      align-items: baseline;
      font-size: 3mm;
      direction: rtl;
    }

    .page__footnote strong {
      color: var(--teal);
      font-weight: 700;
    }

    /* Cover footnote: below the bottom bar */
    .cover .page__footnote {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 16mm;
      padding: 0 20mm;
      display: flex;
      font-size: 3.6mm;
      align-items: center;
      color: #060707;
      font-weight: 500;
      justify-content: flex-end;
      z-index: 5;
    }

    .cover .page__footnote strong {
      color: var(--teal);
    }

    .page__footnote span {
      position: relative;
    }

    .page__footnote span::before {
      position: absolute;
      content: " ";
      top: -2mm;
      width: 16.5mm;
      height: 0.8mm;
      background: var(--gold-line);
      right: 0;
    }

    /* =========================================================
     PAGE 1 — COVER
     ========================================================= */
    .page--cover {
      /* background: linear-gradient(to right, #cbd4d6, #eef3f4), url('images/cover-bg.jpg'); */
      background: linear-gradient(to right, #BED5D8, #EFF2F3), url(images/cover-bg.jpg);
      background-blend-mode: multiply;
      /* background-blend-mode: lighten; */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .cover {
      display: flex;
      flex-direction: row-reverse;
      position: relative;
      height: 100%;
    }

    .cover__sidebar {
      width: 50mm;
      flex-shrink: 0;
      padding-bottom: 18mm;
      background: transparent;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .cover__logo-container {
      width: 38mm;
      height: 22mm;
      display: flex;
    }

    .cover__logo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .cover__sidebar-teal-block {
      background: linear-gradient(90deg,
          #005E81 0%,
          #1E747F 50%,
          #3C8B7D 100%);
      width: 100%;
      height: 26mm;
    }

    .sidebar_top_part {
      position: relative;
      height: 100%;
      padding: 15mm 0 0 0;
    }

    .cover__goldline {
      /* grid-column: 3;
      grid-row: 1 / span 2; */
      background: var(--gold-line);
      width: 1.5mm;
      /* justify-self: center; */
      /* height: 100%; */
      position: absolute;
      right: -30px;
      top: 0;
      height: calc(100% - 7mm);
    }

    .cover__photos-grid {
      width: 44mm;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      margin-inline: 4mm;
      padding-bottom: 18mm;
      z-index: 2;
    }

    .cover__photos-left-col {
      display: flex;
      flex-direction: column;
      gap: 6mm;
      height: 100%;
    }

    .cover__photos-teal-block {
      /* background: var(--navy-mid); */
      background: linear-gradient(to bottom,
          #045F81 0%,
          #0B6E84 20%,
          #1B7F87 45%,
          #2D8F89 70%,
          #4DA08F 100%);
      height: 100mm;
      width: 100%;
    }

    .cover__photo-small-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cover__photo-small {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1);
    }

    .cover__photo-main-container {
      width: 56mm;
      flex-shrink: 0;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover__photo-main {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 100% top;
      transform: scaleX(-1);
      filter: grayscale(1);
    }

    .cover__main-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 18mm;
      z-index: 2;
    }

    .cover__main-top {
      flex: 1;
      display: flex;
      flex-direction: row;
    }

    .cover__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10mm 0 5mm;
      gap: 12mm;
    }

    .cover__title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 30mm;
      line-height: 31mm;
      color: var(--ink);
    }

    .cover__meta {
      display: flex;
      flex-direction: column;
      gap: 2.5mm;
      font-size: 5mm;
      color: var(--ink);
      border-right: 1mm solid var(--gold-line);
      padding: 1mm 3.7mm 1mm 0;
      max-width: 108mm;
      text-align: right;
    }

    .cover__meta p {
      line-height: 1.5;
    }

    .cover__meta strong {
      font-weight: 700;
      color: #060707;
      opacity: 0.9;
    }

    .cover__bottom-bar {
      width: 100%;
      height: 26mm;
      flex-shrink: 0;
      background: linear-gradient(90deg,
          #3C8B7D 0%,
          #005E81 100%);
    }

    /* =========================================================
     PAGE 2 — SECTION DIVIDER
     ========================================================= */
    .divider {
      display: grid;
      grid-template-columns: 1fr 90mm 6mm 42mm;
      /* RTL: Content, Photo, Goldline, Sidebar */
      grid-template-rows: 1fr 22mm;
      height: 100%;
    }

    .divider__sidebar {
      grid-column: 4;
      grid-row: 1 / span 2;
      background: var(--paper-2);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
    }

    .divider__sidebar-teal-block {
      background: var(--navy-mid);
      width: 100%;
      height: 22mm;
    }

    .divider__goldline {
      grid-column: 3;
      grid-row: 1 / span 2;
      background: var(--gold-line);
      width: 0.5mm;
      justify-self: center;
      height: 100%;
    }

    .divider__photo-container {
      grid-column: 2;
      grid-row: 1;
      padding: 10mm 4mm 4mm 4mm;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .divider__photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1);
      border: 1.5mm solid var(--teal);
      border-radius: 4mm;
    }

    .divider__content {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10mm 16mm 4mm 10mm;
    }

    .divider__brand {
      align-self: flex-start;
    }

    .divider__logo-container {
      /* background: var(--white);
      border: 0.26mm solid #d0dcdc;
      padding: 3mm;
      display: flex;
      align-items: center;
      justify-content: center; */
      width: 36mm;
      height: 22mm;
    }

    .divider__logo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .divider__text-box {
      width: 100%;
      text-align: right;
      margin-bottom: 12mm;
    }

    .divider__title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 17mm;
      line-height: 1.15;
      color: var(--ink);
    }

    .divider__bottom-bar {
      grid-column: 1 / span 2;
      grid-row: 2;
      background: var(--navy-mid);
    }

    /* =========================================================
     PAGE 3 — TABLE OF CONTENTS
     ========================================================= */
    .toc {
      position: relative;
      height: 100%;
      padding: 14mm 16mm 12mm;
      background: var(--white);
      overflow: hidden;
    }

    /* Faint Watermarks */
    .toc::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 100mm;
      background: url('images/watermark.png') no-repeat left center;
      background-size: cover;
      opacity: 0.12;
      z-index: 0;
      filter: grayscale(1);
      transform: scaleX(-1);
      pointer-events: none;
    }

    .toc::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 100mm;
      background: url('images/watermark.png') no-repeat right center;
      background-size: cover;
      opacity: 0.12;
      z-index: 0;
      filter: grayscale(1);
      pointer-events: none;
    }

    .toc__corner {
      position: absolute;
      top: 0;
      left: 0;
      width: 70mm;
      height: 22mm;
      background: var(--teal);
      clip-path: polygon(0 0, 100% 0, 78% 100%, 0% 100%);
      z-index: 1;
    }

    .toc__corner-dots {
      position: absolute;
      top: 6mm;
      left: 6mm;
      display: grid;
      grid-template-columns: repeat(5, 1.3mm);
      gap: 1.3mm;
      z-index: 2;
    }

    .toc__corner-dots span {
      width: 0.8mm;
      height: 0.8mm;
      border-radius: 50%;
      background: var(--ink-soft);
      opacity: .4;
    }

    .toc__corner-br {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 60mm;
      height: 20mm;
      background: var(--teal);
      clip-path: polygon(22% 0, 100% 0, 100% 100%, 0% 100%);
      z-index: 1;
    }

    .toc__corner-dots-br {
      position: absolute;
      bottom: 6mm;
      right: 6mm;
      display: grid;
      grid-template-columns: repeat(5, 1.3mm);
      gap: 1.3mm;
      z-index: 2;
    }

    .toc__corner-dots-br span {
      width: 0.8mm;
      height: 0.8mm;
      border-radius: 50%;
      background: var(--ink-soft);
      opacity: .4;
    }

    .toc__heading {
      text-align: center;
      margin-bottom: 6mm;
      position: relative;
      z-index: 2;
    }

    .toc__heading h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 9.5mm;
      color: var(--teal);
      margin-bottom: 2mm;
    }

    .toc__heading .rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2mm;
      margin-top: 1.6mm;
    }

    .toc__heading .rule::before,
    .toc__heading .rule::after {
      content: "";
      height: 0.5mm;
      width: 16mm;
      background: var(--teal);
    }

    .toc__heading .rule .dots-center {
      display: flex;
      gap: 1.5mm;
    }

    .toc__heading .rule .dots-center span {
      width: 1.2mm;
      height: 1.2mm;
      border-radius: 50%;
      background: var(--teal);
    }

    .toc__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 14mm;
      position: relative;
      z-index: 2;
    }

    .toc__list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .toc__item {
      display: grid;
      grid-template-columns: 1fr 8mm 9mm;
      /* RTL: Label, Icon, Number */
      align-items: center;
      gap: 2.6mm;
      padding: 2.2mm 1mm;
      border-bottom: 0.26mm solid #e5eaea;
    }

    .toc__num {
      font-weight: 700;
      font-size: 4.8mm;
      color: var(--teal);
      text-align: center;
      border-right: 0.26mm solid #cdd5d6;
      padding-right: 2.5mm;
      height: 5mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toc__icon {
      width: 8mm;
      height: 8mm;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--teal);
    }

    .toc__icon svg {
      width: 5.5mm;
      height: 5.5mm;
      stroke: var(--teal);
    }

    .toc__label {
      font-size: 4mm;
      font-weight: 500;
      color: var(--ink);
      text-align: right;
    }

    /* =========================================================
     PRINT SETUP
     ========================================================= */
    @media print {

      html,
      body {
        background: none;
      }

      .page {
        margin: 0;
        box-shadow: none;
        width: 297mm;
        height: 210mm;
      }

      @page {
        size: A4 landscape;
        margin: 0;
      }
    }

    @media screen and (max-width: 1300px) {
      .page {
        transform: scale(0.8);
        transform-origin: top center;
      }
    }
  </style>
</head>

<body>

  <!-- ================= PAGE 1 — COVER ================= -->
  <section class="page page--cover">
    <div class="cover">
      <!-- Left sidebar (Column 4 in RTL) -->
      <div class="cover__sidebar">
        <div class="sidebar_top_part">
          <!-- Gold Vertical line (Column 3 in RTL) -->
          <div class="cover__goldline" aria-hidden="true"></div>
          <div class="cover__logo-container">
            <img src="images/company-logo.png" alt="Company Logo" class="cover__logo">
          </div>
        </div>
        <div class="cover__sidebar-teal-block"></div>
      </div>


      <!-- Photos (Left part only) -->
      <div class="cover__photos-grid" aria-hidden="true">
        <div class="cover__photos-left-col">
          <div class="cover__photos-teal-block"></div>
          <div class="cover__photo-small-container">
            <img src="images/cover-small.jpg" alt="" class="cover__photo-small">
          </div>
        </div>
      </div>

      <div class="cover__main-section">
        <div class="cover__main-top">
          <!-- Content (Right) -->
          <div class="cover__content">
            <h1 class="cover__title"> العــــــــــرض
              <br> اﻟﻔﻨـــي
            </h1>
            <div class="cover__meta">
              <p><strong>المنافسة /</strong> صيانة ونظافة وتشغيل المباني اإلدارية
                شمال منطقة الرياض</p>
              <p><strong>الجهه /</strong> وزارة الشؤون اإلسالمية والدعوة واإلرشاد</p>
            </div>
          </div>

          <!-- Main Photo (Left) -->
          <div class="cover__photo-main-container">
            <img src="images/cover-main.png" alt="" class="cover__photo-main">
          </div>
        </div>

        <!-- Bottom horizontal bar -->
        <div class="cover__bottom-bar" aria-hidden="true"></div>
      </div>
      <!-- Footnote in margin -->
      <div class="page__footnote">
        <span><strong>ملاحظة/</strong> العرض ساري لمدة 90 يوم يوم من التاريخ المحدد لتسليم العروض —
          2026 /06 / 16</span>
      </div>
    </div>
  </section>

</body>

</html>
