<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>{{proposal_title}} - {{company_name}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
</head>

<body>

  <!-- ================= PAGE 1 — COVER ================= -->
  <section class="page page--cover">
    <div class="cover">
      <!-- Left sidebar (Column 4 in RTL) -->
      <div class="cover__sidebar">
        <div class="sidebar_top_part">
          <!-- Gold Vertical line (Column 3 in RTL) -->
          <div class="cover__goldline" aria-hidden="true"></div>
          <div class="cover__logo-container">
            <img src="images/company-logo.png" alt="Company Logo" class="cover__logo">
          </div>
        </div>
        <div class="cover__sidebar-teal-block"></div>
      </div>


      <!-- Photos (Left part only) -->
      <div class="cover__photos-grid" aria-hidden="true">
        <div class="cover__photos-left-col">
          <div class="cover__photos-teal-block"></div>
          <div class="cover__photo-small-container">
            <img src="images/cover-small.jpg" alt="" class="cover__photo-small">
          </div>
        </div>
      </div>

      <div class="cover__main-section">
        <div class="cover__main-top">
          <!-- Content (Right) -->
          <div class="cover__content">
            <h1 class="cover__title"> العــــــــــرض
              <br> اﻟﻔﻨـــي
            </h1>
            <div class="cover__meta">
              <p><strong>المنافسة /</strong> {{tender_name}}</p>
              <p><strong>الجهه /</strong> {{client_name}}</p>
            </div>
          </div>

          <!-- Main Photo (Left) -->
          <div class="cover__photo-main-container">
            <img src="images/cover-main.png" alt="" class="cover__photo-main">
          </div>
        </div>

        <!-- Bottom horizontal bar -->
        <div class="cover__bottom-bar" aria-hidden="true"></div>
      </div>
      <!-- Footnote in margin -->
      <div class="page__footnote">
        <span><strong>ملاحظة/</strong> العرض ساري لمدة {{validity_days}} يوم من التاريخ المحدد لتسليم العروض —
          {{submission_date}}</span>
    </div>
  </section>
</body>

</html>
